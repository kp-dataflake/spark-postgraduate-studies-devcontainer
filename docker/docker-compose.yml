services:
  spark-master:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/sbin/start-master.sh &&
      tail -f /dev/null
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ../warehouse:/opt/spark/warehouse

  spark-worker-1:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
    ports:
      - "8081:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: "1"
      SPARK_WORKER_MEMORY: "1g"
    volumes:
      - ../warehouse:/opt/spark/warehouse

  spark-worker-2:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
    ports:
      - "8082:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: "1"
      SPARK_WORKER_MEMORY: "1g"
    volumes:
      - ../warehouse:/opt/spark/warehouse 

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    develop:
      watch:
        - path: ./Dockerfile.jupyter
          action: rebuild
    container_name: jupyter
    hostname: jupyter
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ../notebooks:/home/jovyan/work
      - ../warehouse:/opt/spark/warehouse
    environment:
      SPARK_MASTER: spark://spark-master:7077
      PYSPARK_SUBMIT_ARGS: "--master spark://spark-master:7077 --conf spark.driver.host=jupyter pyspark-shell"
